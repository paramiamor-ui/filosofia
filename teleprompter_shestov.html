<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teleprompter – Lev Shestov</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #f5a623;
    --bg: #0a0a0a;
    --text: #ffffff;
    --muted: #888;
    --radius: 10px;
    --font: 'Georgia', serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px 32px;
  }
  h1 {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    text-align: center;
  }
  #tp-wrapper {
    position: relative;
    width: 100%;
    max-width: 720px;
    height: 60vh;
    min-height: 280px;
    background: #000;
    border-radius: var(--radius);
    border: 1px solid #222;
    overflow: hidden;
  }
  #tp-fade-top, #tp-fade-bottom {
    position: absolute; left: 0; right: 0; height: 100px;
    pointer-events: none; z-index: 2;
  }
  #tp-fade-top    { top: 0;    background: linear-gradient(to bottom, #000 0%, transparent 100%); }
  #tp-fade-bottom { bottom: 0; background: linear-gradient(to top,   #000 0%, transparent 100%); }
  #tp-line {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 2px; background: var(--accent);
    transform: translateY(-50%); z-index: 3;
    pointer-events: none;
  }
  #tp-line::before, #tp-line::after {
    content: '';
    position: absolute; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent);
  }
  #tp-line::before { left: 16px; }
  #tp-line::after  { right: 16px; }
  #tp-scroll {
    height: 100%;
    overflow: hidden;
    padding: 45vh 40px;
  }
  #tp-text {
    font-size: 24px;
    line-height: 1.9;
    color: #fff;
    white-space: pre-wrap;
  }
  #progress-wrap {
    width: 100%; max-width: 720px;
    height: 3px; background: #222;
    border-radius: 2px; margin-top: 10px; overflow: hidden;
  }
  #progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.1s linear; border-radius: 2px;
  }
  #controls {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; margin-top: 18px;
    width: 100%; max-width: 720px;
  }
  button {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 18px; font-size: 14px;
    background: transparent;
    border: 1px solid #333;
    border-radius: var(--radius);
    color: #fff; cursor: pointer;
    font-family: var(--font);
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #1a1a1a; border-color: #555; }
  button svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
  .ctrl-group {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
  }
  .ctrl-group label { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 4px;
    background: #333; border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer; border: none;
  }
  #speed-val {
    font-size: 13px; font-weight: 600;
    color: var(--accent); min-width: 20px; text-align: center;
  }
  @media (max-width: 500px) {
    #tp-text { font-size: 18px; }
    #tp-scroll { padding: 45vh 20px; }
    .ctrl-group { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<h1>Teleprompter &nbsp;·&nbsp; Lev Shestov</h1>

<div id="tp-wrapper">
  <div id="tp-fade-top"></div>
  <div id="tp-fade-bottom"></div>
  <div id="tp-line"></div>
  <div id="tp-scroll">
    <div id="tp-text"></div>
  </div>
</div>

<div id="progress-wrap"><div id="progress-fill"></div></div>

<div id="controls">
  <button id="btn-play">
    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    <span id="btn-label">Iniciar</span>
  </button>
  <button id="btn-reset">
    <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    Reiniciar
  </button>
  <div class="ctrl-group">
    <label>VELOCIDAD</label>
    <input type="range" id="speed-range" min="1" max="10" value="3" step="1" />
    <span id="speed-val">3</span>
  </div>
  <div class="ctrl-group">
    <label>TEXTO</label>
    <input type="range" id="font-range" min="14" max="40" value="24" step="1" />
  </div>
</div>

<script>
const texto = `[Inicio del video]

Hola, hoy voy a hablar sobre un filósofo muy interesante llamado Lev Shestov, considerado uno de los precursores del existencialismo y reconocido por sus críticas a la razón y al pensamiento racionalista.

Lev Shestov nació en Rusia en 1866 y vivió en una época llena de cambios políticos, sociales y filosóficos. Desde joven se interesó por temas relacionados con la libertad humana, la religión, la fe y el sufrimiento. A diferencia de muchos filósofos de su tiempo, él no creía que la razón pudiera explicar absolutamente todo lo que vive una persona.

Para entender mejor su pensamiento, primero hay que saber qué defendía la filosofía racionalista. Durante muchos siglos, muchos pensadores afirmaban que la lógica y la razón eran la mejor manera de encontrar la verdad. Sin embargo, Shestov pensaba que la vida humana es mucho más compleja que eso. Según él, existen experiencias como el dolor, la angustia, la desesperación o la fe que no pueden explicarse solamente con la lógica.

Por eso, una de las ideas principales de Lev Shestov fue criticar la confianza absoluta en la razón. Él decía que muchas veces las personas buscan respuestas racionales porque les da seguridad, pero que la realidad humana no siempre funciona de forma lógica. Para Shestov, la existencia humana está llena de incertidumbre y contradicciones.

Sus ideas estuvieron muy influenciadas por autores como Fiódor Dostoyevski y Friedrich Nietzsche. De Dostoyevski tomó el interés por el sufrimiento humano, la fe y los conflictos internos de las personas. De Nietzsche retomó la crítica hacia las verdades absolutas y la importancia de la libertad individual.

También tuvo mucha relación con el pensamiento de Søren Kierkegaard, quien es considerado el padre del existencialismo. Ambos filósofos compartían la idea de que la fe y la experiencia personal son más importantes que los sistemas racionales que intentan explicarlo todo.

Ahora hablaré un poco sobre sus obras más importantes.

Una de sus obras más famosas es Atenas y Jerusalén. En este libro, Shestov compara dos formas de entender la verdad. Atenas representa la razón y la filosofía griega, mientras que Jerusalén representa la fe y la religión. En esta obra él defiende la idea de que la fe puede llevar al ser humano más lejos que la razón.

Otra obra importante es Todo es posible. En este libro critica las verdades absolutas y habla sobre la libertad humana. Shestov decía que las personas no deberían aceptar límites impuestos únicamente por la lógica o las reglas racionales.

También escribió El poder de las llaves, donde reflexiona sobre el sufrimiento, la religión y los problemas de la existencia humana.

Otra de sus obras destacadas es En la balanza de Job. Aquí utiliza la figura bíblica de Job para analizar el sufrimiento humano y la relación entre el hombre y Dios.

Además, escribió Kierkegaard y la filosofía existencial, donde analiza el pensamiento existencialista y las ideas de Kierkegaard.

Una característica muy importante de Lev Shestov es que su filosofía no se enfocaba únicamente en teorías abstractas, sino en problemas reales que afectan a cualquier persona. Él hablaba de la angustia, el miedo, la desesperación y la búsqueda de sentido en la vida. Por eso muchas personas consideran que su pensamiento sigue siendo actual incluso hoy en día.

Actualmente, el estado del arte sobre Lev Shestov se centra principalmente en su influencia dentro del existencialismo y en su crítica al racionalismo. Aunque durante muchos años no fue tan conocido como otros filósofos europeos, hoy en día sus obras son estudiadas en universidades y centros de investigación filosófica.

Muchos investigadores consideran que Shestov aportó una visión diferente sobre la libertad humana y la relación entre filosofía y religión. También destacan que sus ideas ayudan a comprender mejor los límites de la razón y la importancia de la experiencia personal.

En la actualidad, temas como la ansiedad, la crisis existencial y la búsqueda de identidad han hecho que el pensamiento de Shestov vuelva a tener relevancia. Sus reflexiones sobre el sufrimiento y la incertidumbre conectan con muchos problemas que siguen existiendo en la sociedad moderna.

En mi opinión, lo más interesante de Lev Shestov es que nos hace cuestionar la idea de que todo tiene una explicación lógica. Su filosofía demuestra que los seres humanos no solamente vivimos a través de la razón, sino también mediante emociones, creencias, dudas y experiencias personales.

Además, creo que sus ideas siguen siendo importantes porque actualmente muchas personas buscan respuestas rápidas y racionales para todo, cuando en realidad hay situaciones humanas que son mucho más profundas y complejas.

Para concluir, Lev Shestov fue un filósofo que defendió la libertad humana y criticó la confianza absoluta en la razón. Sus obras hablan sobre la fe, el sufrimiento, la angustia y la existencia humana. Aunque no es tan famoso como otros filósofos, su pensamiento tuvo una gran influencia en el existencialismo y sigue siendo estudiado en la actualidad.

[Fin del video]`;

document.getElementById('tp-text').textContent = texto;

const scrollEl = document.getElementById('tp-scroll');
const progressFill = document.getElementById('progress-fill');
const btnPlay = document.getElementById('btn-play');
const btnLabel = document.getElementById('btn-label');
const iconPlay = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const speedRange = document.getElementById('speed-range');
const speedVal = document.getElementById('speed-val');
const fontRange = document.getElementById('font-range');

let running = false, animId = null, pos = 0, lastTs = null;

function maxScroll() {
  return document.getElementById('tp-text').scrollHeight - scrollEl.clientHeight + scrollEl.clientHeight * 0.45;
}
function speed() { return parseFloat(speedRange.value) * 14; }

function updateProgress() {
  const pct = Math.min(100, (pos / maxScroll()) * 100);
  progressFill.style.width = pct.toFixed(1) + '%';
}

function step(ts) {
  if (!lastTs) lastTs = ts;
  pos += speed() * (ts - lastTs) / 1000;
  lastTs = ts;
  if (pos >= maxScroll()) { pos = maxScroll(); scrollEl.scrollTop = pos; updateProgress(); stop(); return; }
  scrollEl.scrollTop = pos;
  updateProgress();
  animId = requestAnimationFrame(step);
}

function play() {
  running = true; lastTs = null;
  btnLabel.textContent = 'Pausar';
  iconPlay.style.display = 'none'; iconPause.style.display = '';
  animId = requestAnimationFrame(step);
}

function stop() {
  running = false;
  if (animId) cancelAnimationFrame(animId); animId = null;
  btnLabel.textContent = 'Iniciar';
  iconPlay.style.display = ''; iconPause.style.display = 'none';
}

btnPlay.addEventListener('click', () => running ? stop() : play());
document.getElementById('btn-reset').addEventListener('click', () => { stop(); pos = 0; scrollEl.scrollTop = 0; updateProgress(); });
speedRange.addEventListener('input', () => speedVal.textContent = speedRange.value);
fontRange.addEventListener('input', () => document.getElementById('tp-text').style.fontSize = fontRange.value + 'px');
</script>
</body>
</html>
